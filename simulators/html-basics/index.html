<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HTML Basics – Interactive Learning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="vendor/codemirror/codemirror.min.css" />
  <link rel="stylesheet" href="vendor/codemirror/theme/monokai.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="main-tabs">
      <div class="nav-title">HTML Basics</div>
      <button class="tab-arrow" id="prevTabBtn" type="button" aria-label="Go to previous area">←</button>
      <div class="tab-list" role="tablist" aria-label="HTML Basics areas">
        <button class="tab-button tab-active" data-tab="lessons" role="tab">Lessons</button>
        <button class="tab-button" data-tab="practice" role="tab">Simulator</button>
      </div>
      <button class="tab-arrow" id="nextTabBtn" type="button" aria-label="Go to next area">→</button>
    </div>

    <!-- Tab 1: Lessons -->
    <section id="lessonsTab" class="tab-content tab-active">
      <div class="lessons-container">
        <div class="lesson-sidebar">
          <div class="sidebar-header">
            <h3>Lessons</h3>
            <div class="search-container">
              <input type="text" id="lessonSearch" class="search-input" placeholder="Search lessons...">
            </div>
          </div>
          <nav class="lesson-nav" id="lessonNav">
            <button class="lesson-nav-item active" data-lesson="intro">Introduction</button>
            <button class="lesson-nav-item" data-lesson="headings">Hero and Headings</button>
            <button class="lesson-nav-item" data-lesson="layoutBasics">Layout Basics</button>
            <button class="lesson-nav-item" data-lesson="cards">Cards & Components</button>
            <button class="lesson-nav-item" data-lesson="paragraphs">Paragraphs</button>
            <button class="lesson-nav-item" data-lesson="navbar">Navbar</button>
            <button class="lesson-nav-item" data-lesson="images">Images</button>
            <button class="lesson-nav-item" data-lesson="links">Links</button>
            <button class="lesson-nav-item" data-lesson="layoutMovies">Movies Section</button>
            <button class="lesson-nav-item" data-lesson="layoutMusic">Music Section</button>
            <button class="lesson-nav-item" data-lesson="layoutQuickFacts">Quick Facts</button>
          </nav>
          <div class="progress-section">
            <h4>Website Progress</h4>
            <div class="progress-checklist">
              <label class="progress-item">
                <input type="checkbox" data-section="structure" disabled>
                <span>Basic Structure</span>
              </label>
              <label class="progress-item">
                <input type="checkbox" data-section="hero" disabled>
                <span>Hero Section</span>
              </label>
              <label class="progress-item">
                <input type="checkbox" data-section="biography" disabled>
                <span>Biography</span>
              </label>
              <label class="progress-item">
                <input type="checkbox" data-section="navbar" disabled>
                <span>Navbar</span>
              </label>
              <label class="progress-item">
                <input type="checkbox" data-section="footer" disabled>
                <span>Footer</span>
              </label>
              <label class="progress-item">
                <input type="checkbox" data-section="movies" disabled>
                <span>Movies Section</span>
              </label>
              <label class="progress-item">
                <input type="checkbox" data-section="music" disabled>
                <span>Music Section</span>
              </label>
              <label class="progress-item">
                <input type="checkbox" data-section="quickfacts" disabled>
                <span>Quick Facts</span>
              </label>
            </div>
          </div>
          <div class="keyboard-shortcuts">
            <h4>Keyboard Shortcuts</h4>
            <div class="shortcut-item">
              <kbd>↑</kbd><kbd>↓</kbd> Navigate lessons
            </div>
            <div class="shortcut-item">
              <kbd>Ctrl</kbd>/<kbd>Cmd</kbd>+<kbd>F</kbd> Search lessons
            </div>
          </div>
        </div>

        <div class="lesson-content">
          <div id="lessonDisplay" class="lesson-display">
            <div class="lesson-section">
              <h2>Welcome to HTML Basics</h2>
              <p>Select a lesson from the sidebar to get started!</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab 2: Practice Builder -->
    <section id="practiceTab" class="tab-content">
      <div class="practice-container">
        <div class="practice-editor">
          <div class="editor-header">
            <h2>HTML Editor</h2>
            <div class="editor-actions">
              <button id="assetUploadBtn" class="btn-ghost btn-small" type="button">Upload Image</button>
              <button id="clearBtn" class="btn-ghost btn-small">Clear</button>
            </div>
          </div>
          <input id="assetUploadInput" type="file" accept="image/*" multiple hidden>
          <div id="assetShelf" class="asset-shelf" aria-live="polite"></div>
          <textarea id="htmlEditor" class="html-editor" placeholder="Paste the code from Step 1 here."></textarea>
        </div>

        <div class="practice-preview">
          <div class="preview-header">
            <h2>Live Preview</h2>
            <div class="preview-controls">
              <button id="toggleViewBtn" class="btn-ghost btn-small" title="Toggle full-page preview">Full Page</button>
              <button id="refreshBtn" class="btn-primary btn-small">Refresh</button>
              <button id="exportBtn" class="btn-primary btn-small">Export HTML</button>
              <button id="exportImageBtn" class="btn-primary btn-small">Export Image</button>
              <div id="previewError" class="preview-error" style="display: none;"></div>
            </div>
          </div>
          <!-- 
            Note: Using both allow-same-origin and allow-scripts is intentional and safe here.
            - allow-scripts: Required for Bootstrap JavaScript to work (accordions, navbar toggles, etc.)
            - allow-same-origin: Required for html2canvas to access iframe content for image export
            The content is user-generated HTML in a controlled environment, so this is acceptable.
          -->
          <iframe id="previewFrame" class="preview-frame" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
      </div>
    </section>
  </div>

  <script src="vendor/codemirror/codemirror.min.js"></script>
  <script src="vendor/codemirror/mode/xml/xml.min.js"></script>
  <script src="vendor/codemirror/mode/javascript/javascript.min.js"></script>
  <script src="vendor/codemirror/mode/css/css.min.js"></script>
  <script src="vendor/codemirror/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
